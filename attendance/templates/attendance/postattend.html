{% extends 'temp/teacher.html' %}
{% block base %}

<section class="book_section layout_padding">
  <div class="container" style="width:600px;">
    <div class="row">

      <form method="post">
        {% csrf_token %}

        <h4><span>Attendance</span></h4>

        <!-- SUCCESS MESSAGE -->
        {% if message %}
        <div class="alert alert-success">
            {{ message }}
        </div>
        {% endif %}

        <!-- CLASS & DIVISION SELECT -->
        <div class="form-row">
          <div class="form-group col-lg-6">
            <label for="cls">Class</label>
            <select name="cls" id="cls" class="form-control">
              <option value="1">1</option>
              <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>


            </select>
          </div>

          <div class="form-group col-lg-6">
            <label for="divi">Division</label>
            <select name="divi" id="divi" class="form-control">
              <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
            </select>
          </div>
        </div>

        <!-- SEARCH BUTTON -->
        <div class="btn-box mb-3">
          <input type="submit" name="search" value="Search Students" class="btn btn-primary">
        </div>

        <!-- STUDENT TABLE -->
        {% if std %}
        <table class="table table-bordered">
          <tr>
            <td>Date</td>
            <td><input type="date" name="dat" required></td>
            <td></td>
          </tr>

          <tr>
            <th>Student ID</th>
            <th>Student Name</th>
            <th>Absent</th>
          </tr>

          {% for o in std %}
          <tr>
            <td>{{ o.student_id }}</td>
            <td>{{ o.stdname }}</td>
            <td>
              <input type="checkbox" name="ch{{ o.student_id }}" value="1">
            </td>
          </tr>
          {% endfor %}

          <tr>
            <td colspan="3" class="text-center">
              <input type="submit" name="submit" value="Save Attendance" class="btn btn-success">
            </td>
          </tr>
        </table>
        {% endif %}

      </form>

    </div>
  </div>
</section>

{% endblock %}
