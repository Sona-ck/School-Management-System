{% extends 'temp/teacher.html' %}
{% block base %}

<section class="book_section layout_padding">
  <div class="container" style="width:500px;">
    <div class="row">

      <!-- Form to Add Transport Fees -->
      <form method="post" style="margin-bottom:30px;">
        {% csrf_token %}
        <h4><span>Add Transport Fee</span></h4>

        <div class="form-row">
          <div class="form-group col-lg-12">
            <label>From</label>
            <input type="text" class="form-control" name="from" placeholder="Pickup Location" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-12">
            <label>To</label>
            <input type="text" class="form-control" name="to" placeholder="Drop Location" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-12">
            <label>Amount</label>
            <input type="number" class="form-control" name="amount" placeholder="Amount" required>
          </div>
        </div>

        <div class="btn-box">
          <input type="submit" class="btn" value="Add">
        </div>
      </form>

      <!-- Table to Display Existing Fees -->
      <h4><span>Existing Transport Fees</span></h4>
      <table class="table table-bordered">
        <thead>
          <tr>
            <th>From</th>
            <th>To</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          {% for fee in fees %}
          <tr>
            <td>{{ fee.from_field }}</td>
            <td>{{ fee.to }}</td>
            <td>{{ fee.amount }}</td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" style="text-align:center;">No transport fees found.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>
  </div>
</section>

{% endblock %}
