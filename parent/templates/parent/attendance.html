{% extends 'temp/parent.html' %}
{% block base %}

<h2>{{ student.name }} - Attendance</h2>

<table border="1" style="width:100%; text-align:center;">
    <tr>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for i in attendance %}
    <tr>
        <td>{{ i.date }}</td>
        <td>{{ i.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No attendance records</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
