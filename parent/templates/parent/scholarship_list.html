{% extends 'temp/home.html' %}
{% block base %}

<div class="container mt-4">
<h2>All Scholarships</h2>
<ul>
{% for s in scholarships %}
    <li>
        <strong>{{ s.title }}</strong> - {{ s.description }}<br>
        Deadline: {{ s.deadline }}<br>
        {% if s in eligible_scholarships %}
            <span style="color:green;">You are eligible!</span>
        {% endif %}
    </li>
{% endfor %}
</ul>

</div>

{% endblock %}
