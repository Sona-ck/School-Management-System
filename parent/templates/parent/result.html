{% extends 'temp/parent.html' %}
{% block base %}

<h2>{{ student.name }} - Results</h2>

<table border="1" style="width:100%; text-align:center;">
    <tr>
        <th>Subject</th>
        <th>Marks</th>
    </tr>

    {% for i in results %}
    <tr>
        <td>{{ i.subject }}</td>
        <td>{{ i.marks }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="2">No results available</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
