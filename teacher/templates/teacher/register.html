{% extends 'temp/home.html' %}
{% block base %}
  <section class="book_section layout_padding">
    <div class="container" style="width:350px;">
      <div class="row">
{#        <div class="col">#}
          <form method="post">
              {% csrf_token %}
            <h4><span>Sign Up</span>
            </h4>
            <div class="form-row">
              <div class="form-group col-lg-4">
                <label for="user">Name </label>
                <input type="text" class="form-control" id="user" placeholder="Username" name="user" style="width:350px;" required="">
              </div>
            </div>
            <div class="form-row ">
              <div class="form-group col-lg-4">
                <label for="email">E-Mail</label>
                <input type="email" class="form-control" id="email" placeholder="E-mail" name="email" style="width:350px;" required="">
              </div>
            </div>
              <div class="form-row ">
              <div class="form-group col-lg-4">
                <label for="email">Address</label>
                <input type="text" class="form-control" id="address" placeholder="Address" name="address" style="width:350px;" required="">
              </div>
            </div>
              <div class="form-row ">
              <div class="form-group col-lg-4">
                <label for="Contact">Contact</label>
                <input type="text" class="form-control" id="contact" pattern="[0-9]{10}" placeholder="Phone number" name="phone" style="width:350px;" required="">
              </div>
            </div>
            <div class="form-row ">
              <div class="form-group col-lg-4">
                <label for="pass">Password</label>
                <input type="password" class="form-control" id="pass" placeholder="password" name="pass" style="width:350px;" required="">
              </div>
            </div>
              <div class="form-row ">
              <div class="form-group col-lg-4">
                <label for="copass">Qualification</label>
                <input type="text" class="form-control" id="copass" placeholder="Qualification" name="quali" style="width:350px;" required="">
              </div>
            </div>
              <div class="form-row ">
              <div class="form-group col-lg-4">
                <label for="copass">Gender</label>
                <input type="text" class="form-control" id="copass" placeholder="Gender" name="gen" style="width:350px;" required="">
              </div>
            </div>
            <div class="btn-box">
              <input type="submit" class="btn"  value="Signup">
            </div>
          </form>
{#        </div>#}
      </div>
    </div>
  </section>
