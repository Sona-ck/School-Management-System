{% extends 'temp/home.html' %}
{% block base %}

<section class="layout_padding">
<div class="container">

<h2 class="text-center">Add Notification</h2>
<hr>

<form method="post">
    {% csrf_token %}

    <!-- TITLE -->
    <div class="form-group mb-3">
        <label>Notification Title</label>
        <input type="text" name="title" class="form-control" placeholder="Enter title" required>
    </div>

    <!-- MESSAGE -->
    <div class="form-group mb-3">
        <label>Message</label>
        <textarea name="message" class="form-control" rows="4" placeholder="Enter message" required></textarea>
    </div>

    <!-- PRIORITY -->
    <div class="form-group mb-3">
        <label>Priority</label>
        <select name="priority" class="form-control">
            <option value="Normal">Normal</option>
            <option value="Important">Important</option>
            <option value="Urgent">Urgent</option>
        </select>
    </div>

    <!-- SUBMIT BUTTON -->
    <div class="text-center">
        <button type="submit" class="btn btn-success">Post Notification</button>
    </div>

</form>

<br>

<div class="text-center">
    <a href="/teacher/" class="btn btn-secondary">Back to Dashboard</a>
</div>

</div>
</section>

{% endblock %}
