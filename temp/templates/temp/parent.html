{% extends 'temp/home.html' %}
{% block base %}

<section class="book_section layout_padding">
  <div class="container" style="width:350px;">
    <div class="row">

      <form method="post">
        {% csrf_token %}

        <h4><span>Parent Sign Up</span></h4>

        <div class="form-row">
          <div class="form-group col-lg-4">
            <label>Name</label>
            <input type="text"
                   class="form-control"
                   name="name"
                   placeholder="Parent Name"
                   style="width:350px;" required="">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-4">
            <label>Phone</label>
            <input type="text"
                   class="form-control"
                   name="phone"
                   pattern="[0-9]{10}"
                   placeholder="Phone Number"
                   style="width:350px;" required="">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-4">
            <label>Email</label>
            <input type="email"
                   class="form-control"
                   name="email"
                   placeholder="E-mail"
                   style="width:350px;" required="">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-4">
            <label>Address</label>
            <input type="text"
                   class="form-control"
                   name="address"
                   placeholder="Address"
                   style="width:350px;" required="">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-4">
            <label>Student ID</label>
            <input type="text"
                   class="form-control"
                   name="sid"
                   placeholder="Student ID"
                   style="width:350px;" required="">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group col-lg-4">
            <label>Password</label>
            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Password"
                   style="width:350px;" required="">
          </div>
        </div>

        <div class="btn-box">
          <input type="submit" class="btn" value="Register">
        </div>

      </form>

    </div>
  </div>
</section>

{% endblock %}
